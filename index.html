<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Wordle</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h1>Guess a word!</h1>
  <div class="GameBoard">
    <div class="row active-row" data-row="1">
      <input class="cell" type="text" maxlength="1" data-row="1" data-number="1">
      <input class="cell" type="text" maxlength="1" data-row="1" data-number="2">
      <input class="cell" type="text" maxlength="1" data-row="1" data-number="3">
      <input class="cell" type="text" maxlength="1" data-row="1" data-number="4">
      <input class="cell" type="text" maxlength="1" data-row="1" data-number="5">
    </div>
    <div class="row" data-row="2">
      <input class="cell" type="text" maxlength="1" data-row="2" data-number="1" disabled>
      <input class="cell" type="text" maxlength="1" data-row="2" data-number="2" disabled>
      <input class="cell" type="text" maxlength="1" data-row="2" data-number="3" disabled>
      <input class="cell" type="text" maxlength="1" data-row="2" data-number="4" disabled>
      <input class="cell" type="text" maxlength="1" data-row="2" data-number="5" disabled>
    </div>
    <div class="row" data-row="3">
      <input class="cell" type="text" maxlength="1" data-row="3" data-number="1" disabled>
      <input class="cell" type="text" maxlength="1" data-row="3" data-number="2" disabled>
      <input class="cell" type="text" maxlength="1" data-row="3" data-number="3" disabled>
      <input class="cell" type="text" maxlength="1" data-row="3" data-number="4" disabled>
      <input class="cell" type="text" maxlength="1" data-row="3" data-number="5" disabled>
    </div>
    <div class="row" data-row="4">
      <input class="cell" type="text" maxlength="1" data-row="4" data-number="1" disabled>
      <input class="cell" type="text" maxlength="1" data-row="4" data-number="2" disabled>
      <input class="cell" type="text" maxlength="1" data-row="4" data-number="3" disabled>
      <input class="cell" type="text" maxlength="1" data-row="4" data-number="4" disabled>
      <input class="cell" type="text" maxlength="1" data-row="4" data-number="5" disabled>
    </div>
    <div class="row" data-row="5">
      <input class="cell" type="text" maxlength="1" data-row="5" data-number="1" disabled>
      <input class="cell" type="text" maxlength="1" data-row="5" data-number="2" disabled>
      <input class="cell" type="text" maxlength="1" data-row="5" data-number="3" disabled>
      <input class="cell" type="text" maxlength="1" data-row="5" data-number="4" disabled>
      <input class="cell" type="text" maxlength="1" data-row="5" data-number="5" disabled>
    </div>
    <div class="row" data-row="6">
      <input class="cell" type="text" maxlength="1" data-row="6" data-number="1" disabled>
      <input class="cell" type="text" maxlength="1" data-row="6" data-number="2" disabled>
      <input class="cell" type="text" maxlength="1" data-row="6" data-number="3" disabled>
      <input class="cell" type="text" maxlength="1" data-row="6" data-number="4" disabled>
      <input class="cell" type="text" maxlength="1" data-row="6" data-number="5" disabled>
    </div>
  </div>
  <div id="error" style="color:red;"></div>
  <script src="js/constants.js"></script>
  <script src="js/gameLogic.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
